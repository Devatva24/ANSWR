<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>ANSWR</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  width: 340px;
  font-family: 'Manrope', system-ui, sans-serif;
  background: #0a0a0c;
  color: #ffffff;
  -webkit-font-smoothing: antialiased;
}

.header { padding: 28px 24px 24px; border-bottom: 1px solid rgba(255,255,255,0.06); text-align: center; }
.title { font-weight: 800; font-size: 20px; letter-spacing: 0.04em; text-transform: uppercase; color: #fff; }
.subtitle { font-size: 13px; color: rgba(255,255,255,0.5); margin-top: 6px; font-weight: 500; }

.body { padding: 24px; }

.status-row {
  display: flex; align-items: center; gap: 14px; padding: 18px;
  background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); 
  border-radius: 14px; margin-bottom: 28px;
}
.s-icon {
  width: 32px; height: 32px; border-radius: 10px; background: rgba(255,255,255,0.05);
  display: flex; align-items: center; justify-content: center;
}
.s-icon.on { background: rgba(167, 243, 208, 0.1); color: #a7f3d0; }
.s-text { flex: 1; }
.s-title { font-size: 14px; font-weight: 700; }
.s-desc { font-size: 12px; color: rgba(255,255,255,0.5); margin-top: 2px; font-weight: 500; }

label { display: block; font-size: 12px; font-weight: 700; color: rgba(255,255,255,0.6); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.05em; }
input, select {
  width: 100%; padding: 14px 16px; background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1);
  border-radius: 12px; font-family: inherit; font-size: 14px; color: #fff;
  margin-bottom: 24px; outline: none; transition: all 0.2s; font-weight: 500;
}
input:focus, select:focus { border-color: rgba(255,255,255,0.3); background: rgba(0,0,0,0.4); }
select {
  appearance: none;
  background-image: url("data:image/svg+xml;charset=UTF-8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23ffffff' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpolyline points='6 9 12 15 18 9'%3E%3C/polyline%3E%3C/svg%3E");
  background-repeat: no-repeat; background-position: right 16px center; background-size: 16px;
}
select option { background: #111; color: #fff; }

.btn {
  width: 100%; padding: 14px; font-family: inherit;
  font-size: 14px; font-weight: 700; cursor: pointer; border-radius: 12px;
  transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1); border: none; text-align: center;
  letter-spacing: 0.02em;
}
.btn-primary { background: #ffffff; color: #000; box-shadow: 0 4px 14px rgba(255,255,255,0.1); }
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(255,255,255,0.15); }
.btn-primary:active { transform: scale(0.98); }
.btn-outline { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1); color: #fff; margin-top: 12px; }
.btn-outline:hover { background: rgba(255,255,255,0.08); }

.toast {
  position: fixed; bottom: 24px; left: 24px; right: 24px; padding: 14px;
  border-radius: 12px; text-align: center; font-size: 13px; font-weight: 700;
  transform: translateY(150%); transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px);
}
.toast.show { transform: translateY(0); }
.toast.ok { background: rgba(16, 185, 129, 0.2); color: #a7f3d0; border-color: rgba(16, 185, 129, 0.3); }
.toast.err { background: rgba(239, 68, 68, 0.2); color: #fecaca; border-color: rgba(239, 68, 68, 0.3); }
</style>
</head>
<body>
<div class="header">
  <div class="title">ANSWR</div>
  <div class="subtitle">Premium AI Solver</div>
</div>
<div class="body">
  <div class="status-row">
    <div class="s-icon" id="s-accent">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
    </div>
    <div class="s-text">
      <div class="s-title" id="s-title">Checking...</div>
      <div class="s-desc" id="s-desc">Detecting page</div>
    </div>
  </div>

  <label>Groq API Key</label>
  <input type="password" id="api-key" placeholder="gsk_..."/>
  <label>Model</label>
  <select id="model-sel">
    <option value="llama-3.3-70b-versatile">Llama 3.3 70B</option>
    <option value="llama-3.1-8b-instant">Llama 3.1 8B</option>
    <option value="mixtral-8x7b-32768">Mixtral 8x7B</option>
  </select>
  <button class="btn btn-primary" id="save-btn">Save Settings</button>
  <button class="btn btn-outline" id="groq-btn">Get Groq API Key</button>
</div>
<div class="toast" id="toast"></div>
<script src="popup.js"></script>
</body>
</html>
